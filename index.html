<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEEM · secure key system</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000; /* pure black */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* floating white dots */
        .dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
            pointer-events: none;
            z-index: 1;
            animation: floatDot linear infinite;
        }

        @keyframes floatDot {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120vh) translateX(40px);
                opacity: 0;
            }
        }

        /* main content layer above dots */
        .content {
            position: relative;
            z-index: 100;
            width: 100%;
            max-width: 800px;
            padding: 1.5rem;
        }

        /* cards with subtle glass effect on black */
        .card {
            background: rgba(15, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            padding: 3rem 2.8rem;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: transform 0.2s ease;
            color: white;
        }

        /* main page specific */
        #entryContainer {
            display: block;
            text-align: center;
        }

        #dashboardContainer {
            display: none;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
            margin-bottom: 1rem;
        }

        .subhead {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 2.8rem;
            display: flex;
            justify-content: center;
            gap: 2.2rem;
            flex-wrap: wrap;
            font-weight: 400;
        }

        .subhead span {
            background: rgba(255,255,255,0.02);
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* key input area */
        .key-field {
            background: #0b0f12;
            border: 2px solid #2a3a44;
            border-radius: 40px;
            padding: 1.5rem 2rem;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            color: #f0f6fc;
            min-height: 140px;
            resize: vertical;
            outline: none;
            transition: border 0.15s, box-shadow 0.15s;
            box-shadow: 0 8px 0 #0a1219;
            margin-bottom: 2rem;
        }

        .key-field:focus {
            border-color: #5f8fb0;
            box-shadow: 0 0 20px #3f7fb0, 0 8px 0 #0a1219;
        }

        .key-field::placeholder {
            color: #4f5f6b;
            font-size: 1.2rem;
        }

        .enter-hint {
            color: #aaa;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* dashboard layout */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            margin: 2.5rem 0 3rem;
            flex-wrap: wrap;
        }

        .stat-block {
            flex: 1 1 200px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            padding: 2rem 1rem;
            backdrop-filter: blur(4px);
        }

        .stat-label {
            color: #b0c7db;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 4rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 0 20px #a0d0ff;
            line-height: 1.2;
        }

        .download-btn {
            background: #1a405a;
            border: 2px solid #70b8ff;
            color: white;
            font-size: 2.2rem;
            font-weight: 600;
            padding: 1.5rem 4rem;
            border-radius: 80px;
            box-shadow: 0 12px 0 #0d2636, 0 0 30px #0077ff;
            cursor: pointer;
            transition: 0.08s linear;
            letter-spacing: 2px;
            margin: 1rem auto 2rem;
            width: fit-content;
        }

        .download-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #0d2636, 0 0 40px #2f9eff;
        }

        .secondary-btn {
            background: transparent;
            border: 2px solid #3d5d78;
            color: #d3eaff;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .secondary-btn:hover {
            background: #1a3e58;
            border-color: #7cb2e0;
        }

        .top-left {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 200;
        }

        /* invalid overlay (2 sec) */
        .invalid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            font-size: 5rem;
            font-weight: 700;
            color: #ff7a7a;
            text-shadow: 0 0 40px red;
        }
        .invalid-overlay.show { opacity: 1; }

        /* responsive */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .subhead { gap: 1rem; }
            .stats-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- floating white dots (generated by js) -->
    <div id="dot-container" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;"></div>

    <!-- redeem another button (dashboard only, appears top left) -->
    <div class="top-left" id="redeemAnotherContainer" style="display: none;">
        <button class="secondary-btn" id="redeemAnotherBtn" style="background:#0b1f2c; border-color:#4d83aa;">← REDEEM ANOTHER</button>
    </div>

    <!-- invalid overlay -->
    <div id="invalidOverlay" class="invalid-overlay">INVALID KEY</div>

    <!-- MAIN PAGE (REDEEM KEY) -->
    <div class="content">
        <div id="entryContainer" class="card">
            <h1>REDEEM KEY</h1>
            <div class="subhead">
                <span>🔒 100% Secure</span>
                <span>⬇️ Daily Downloads</span>
                <span>⏳ One Time Use</span>
            </div>
            <textarea id="keyInput" class="key-field" placeholder="Enter your key..."></textarea>
            <div class="enter-hint">⏎ press Enter to redeem</div>
        </div>

        <!-- DASHBOARD PAGE -->
        <div id="dashboardContainer" class="card">
            <h1 style="font-size:3.5rem;">DASHBOARD</h1>
            <div class="stats-row">
                <div class="stat-block">
                    <div class="stat-label">ACTIVE USERS</div>
                    <div class="stat-value" id="activeUsersCount">12</div>
                </div>
                <div class="stat-block">
                    <div class="stat-label">REMAINING KEYS</div>
                    <div class="stat-value" id="remainingKeysCount">92</div>
                </div>
            </div>
            <!-- download button centered -->
            <div style="display: flex; justify-content: center;">
                <button class="download-btn" id="downloadBtn">⬇ DOWNLOAD</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIG ----------
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1482925096686452736/6QZymXtZx-zInoMnlL62P7HdtexqUjC4kJiCBg6ksAMraQ41WwIpsLztuYL1wBLfRNFu";

            // ---------- FLOATING DOTS ----------
            function createDot() {
                const dot = document.createElement('div');
                dot.className = 'dot';
                const size = Math.random() * 4 + 2; // 2~6px — tiny but visible
                dot.style.width = size + 'px';
                dot.style.height = size + 'px';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDuration = (Math.random() * 15 + 10) + 's'; // 10-25s
                dot.style.animationDelay = (Math.random() * -20) + 's';
                document.getElementById('dot-container').appendChild(dot);
            }
            for (let i = 0; i < 90; i++) createDot(); // plenty of dots

            // ---------- KEY POOL (one-time use + auto new) ----------
            const INITIAL_KEYS = [
                "F-8439D-Vr2W-Df","G-12A4B-Xy7Z-Lm","H-9876C-Kp3Q-Rt","J-3452D-Sw5F-Op",
                "K-7643E-Qa9Z-Xy","L-2345F-Ty7U-Bn","M-8901G-Rt2Y-Vc","N-4567H-Lk4P-Qa",
                "P-2341J-Zx9W-Sd","Q-6789K-Mn3B-Cf","R-3456L-Vb8N-Gh","S-7890M-Cx2Z-Jk",
                "T-4321N-Qw5R-Ty","V-2109P-Yu7I-Op","W-8765Q-Az3E-Lm","X-5432R-Fd6S-Xc",
                "Y-1098S-Gh4J-Vb","Z-6543T-Jk8L-Nm","A-3210U-Bn2M-Qw","B-9876V-Cv3X-Za",
                "C-4567W-Rt5Y-Sd","D-2345X-Ty7U-Fg","E-8901Y-Lk9P-Hj","H-1234Z-Mn1Q-Kl",
                "I-6789A-Bv2C-Xz","J-3456B-Nm3D-Fr","K-9012C-Vb4E-Gt","L-5678D-Cx5F-Hy",
                "M-2341E-Zx6G-Jk","N-7890F-Qw7H-Lp","O-4567G-We8I-Mn","P-1234H-Rt9J-Nb",
                "Q-6789I-Ty0K-Vc","R-3452J-Yu1L-Xz","S-8901K-Io2M-Qa","T-5678L-Pa3N-Ws",
                "V-2349M-Sd4O-Er","W-7890N-Fg5P-Ty","X-4561O-Hj6Q-Zx","Y-1237P-Kl7R-Vb",
                "Z-6784Q-Xz8S-Cv","A-3459R-Cv9T-Bn","B-9012S-Bn0U-Mn","C-5673D-Nm1V-Qw",
                "D-2345F-Rt2W-Xy","E-7896G-Ty3X-Za","F-4567H-Yu4Y-Sd","G-1238I-Op5Z-Cf",
                "H-6789J-Pa6A-Dg","I-3450K-Sd7B-Fh","J-8901L-Df8C-Gj","K-5672M-Gh9D-Hk",
                "L-2346N-Hj0E-Il","M-7893J-Kl1F-Jm"
            ];

            let keyPool = INITIAL_KEYS.map(k => ({ key: k, used: false }));
            let activeUsers = 12;   // simulated, can be dynamic

            // DOM elements
            const entryContainer = document.getElementById('entryContainer');
            const dashboardContainer = document.getElementById('dashboardContainer');
            const keyInput = document.getElementById('keyInput');
            const invalidOverlay = document.getElementById('invalidOverlay');
            const activeSpan = document.getElementById('activeUsersCount');
            const remainingSpan = document.getElementById('remainingKeysCount');
            const downloadBtn = document.getElementById('downloadBtn');
            const redeemAnotherBtn = document.getElementById('redeemAnotherBtn');
            const redeemAnotherContainer = document.getElementById('redeemAnotherContainer');

            let invalidTimeout = null;

            // helper: hide invalid overlay
            function hideInvalid() {
                invalidOverlay.classList.remove('show');
                if (invalidTimeout) { clearTimeout(invalidTimeout); invalidTimeout = null; }
            }

            // show invalid for 2 sec
            function showInvalid() {
                hideInvalid();
                void invalidOverlay.offsetWidth;
                invalidOverlay.classList.add('show');
                invalidTimeout = setTimeout(() => invalidOverlay.classList.remove('show'), 2000);
            }

            // generate a new random key (simple)
            function generateNewKey() {
                const p1 = String.fromCharCode(65 + Math.floor(Math.random()*26));
                const p2 = Math.random().toString(36).substring(2,7).toUpperCase();
                const p3 = Math.random().toString(36).substring(2,6).toUpperCase();
                const p4 = Math.random().toString(36).substring(2,4).toUpperCase();
                return `${p1}-${p2}-${p3}-${p4}`;
            }

            // send discord webhook
            async function sendWebhook(usedKey, remaining) {
                const payload = {
                    content: `🔑 **Key Used:** \`${usedKey}\`\n📊 **Keys remaining:** ${remaining}`,
                    username: "Key System",
                };
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch (e) {
                    console.warn("Webhook failed", e);
                }
            }

            // refresh counters & UI
            function refreshCounters() {
                const remaining = keyPool.filter(k => !k.used).length;
                if (remainingSpan) remainingSpan.innerText = remaining;
                if (activeSpan) activeSpan.innerText = activeUsers;
            }

            // consume key (mark used, generate new, webhook)
            function consumeKey(enteredKey) {
                const idx = keyPool.findIndex(k => k.key === enteredKey && !k.used);
                if (idx === -1) return false;
                keyPool[idx].used = true;

                // generate new and push
                let fresh = generateNewKey();
                while (keyPool.some(k => k.key === fresh)) fresh = generateNewKey();
                keyPool.push({ key: fresh, used: false });

                const remaining = keyPool.filter(k => !k.used).length;
                // send webhook asynchronously (don't wait)
                sendWebhook(enteredKey, remaining);

                refreshCounters();
                return true;
            }

            // validation & routing
            function validateAndRoute() {
                const raw = keyInput.value.trim();
                if (!raw) return;
                const firstLine = raw.split('\n')[0].trim();
                const keyObj = keyPool.find(k => k.key === firstLine && !k.used);
                if (keyObj) {
                    consumeKey(firstLine);
                    // switch to dashboard
                    entryContainer.style.display = 'none';
                    dashboardContainer.style.display = 'block';
                    redeemAnotherContainer.style.display = 'block';  // show top-left button
                    keyInput.value = '';
                    hideInvalid();
                } else {
                    showInvalid();
                    keyInput.select();
                }
            }

            // back to redeem page
            function goToRedeem() {
                dashboardContainer.style.display = 'none';
                entryContainer.style.display = 'block';
                redeemAnotherContainer.style.display = 'none';
                keyInput.focus();
                refreshCounters();
            }

            // download action (increment active users)
            function handleDownload() {
                activeUsers++;
                refreshCounters();
                alert('⬇️ Download started (simulated). Active users updated.');
            }

            // event listeners
            keyInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    validateAndRoute();
                }
            });
            keyInput.addEventListener('input', hideInvalid);
            keyInput.addEventListener('focus', hideInvalid);

            redeemAnotherBtn.addEventListener('click', goToRedeem);
            downloadBtn.addEventListener('click', handleDownload);

            // initial state
            refreshCounters();
            entryContainer.style.display = 'block';
            dashboardContainer.style.display = 'none';
            redeemAnotherContainer.style.display = 'none';
        })();
    </script>
</body>
</html>
